<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pack Your Tour</title>
<meta name="viewport" content="width=1440, initial-scale=1" />
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: rgb(238, 238, 240); }
  body {
    font-family: "Helvetica Neue", Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #131219; -webkit-font-smoothing: antialiased; letter-spacing: 0.02em;
  }
  #root { min-height: 100vh; }
  @keyframes pytFadeDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pytFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pytModalIn {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  button:focus-visible {
    outline: 2px solid rgb(87, 75, 255);
    outline-offset: 2px;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="tokens.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="src/Primitives.jsx"></script>
  <script type="text/babel" src="src/Shell.jsx"></script>
  <script type="text/babel" src="src/Itinerary.jsx"></script>
  <script type="text/babel" src="src/Settings.jsx"></script>
  <script type="text/babel">
    const { useState: useStateApp } = React;

    const PAGE_TITLES = {
      tours:    'Tokyo Discovery Tour',
      orders:   'Orders',
      tasks:    'My Tasks',
      clients:  'Clients',
      settings: 'Settings',
    };

    const PAGE_BREADCRUMBS = {
      tours: { parent: 'Public Tours' },
    };

    function PlaceholderPage({ title }) {
      const PL = window.PYT;
      return (
        <div style={{
          flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
          minHeight: 400, color: PL.color.ink400,
          fontFamily: PL.font.sans, fontSize: 14, letterSpacing: PL.font.tracking.sm,
        }}>
          {title} — coming soon
        </div>
      );
    }

    function App() {
      const [page, setPage] = useStateApp('settings');

      function renderPage() {
        if (page === 'tours')    return <Itinerary />;
        if (page === 'settings') return <Settings />;
        return <PlaceholderPage title={PAGE_TITLES[page] || page} />;
      }

      return (
        <Shell
          page={page}
          onNav={setPage}
          title={PAGE_TITLES[page] || page}
          breadcrumb={PAGE_BREADCRUMBS[page]}
        >
          {renderPage()}
        </Shell>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
